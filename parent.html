<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnSpark — Parent Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 24px 16px;
      color: #333;
    }
    .container { max-width: 900px; margin: 0 auto; }

    /* ── Login ── */
    .login-card {
      background: white;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 420px;
      margin: 80px auto 0;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      text-align: center;
    }
    .login-card h1 { font-size: 1.8rem; margin-bottom: 6px; }
    .login-card p { color: #666; margin-bottom: 28px; }
    .input-group { margin-bottom: 16px; text-align: left; }
    .input-group label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 6px; color: #555; }
    .input-group input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 1rem; outline: none; transition: border .2s;
    }
    .input-group input:focus { border-color: #667eea; }
    .btn-login {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      margin-top: 8px; transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; }
    .error-msg { color: #e74c3c; font-size: .85rem; margin-top: 10px; }

    /* ── Dashboard ── */
    .dashboard-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    .dashboard-header h1 { color: white; font-size: 1.8rem; }
    .btn-signout {
      background: rgba(255,255,255,.2); color: white;
      border: 2px solid rgba(255,255,255,.5); border-radius: 10px;
      padding: 8px 18px; cursor: pointer; font-size: .9rem; font-weight: 600;
      transition: background .2s;
    }
    .btn-signout:hover { background: rgba(255,255,255,.35); }
    .btn-add-player {
      background: rgba(255,255,255,.9); color: #667eea;
      border: none; border-radius: 10px;
      padding: 8px 18px; cursor: pointer; font-size: .9rem; font-weight: 700;
      transition: background .2s;
    }
    .btn-add-player:hover { background: white; }

    /* ── Add Player Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal-card {
      background: white; border-radius: 20px;
      padding: 36px 32px; width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      text-align: center;
    }
    .modal-card h2 { margin-bottom: 6px; font-size: 1.4rem; }
    .modal-card p  { color: #666; margin-bottom: 20px; font-size: .9rem; }
    .modal-input {
      width: 100%; padding: 11px 14px; margin-bottom: 14px;
      border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 1rem; outline: none; transition: border .2s;
    }
    .modal-input:focus { border-color: #667eea; }
    .modal-avatar-grid {
      display: flex; flex-wrap: wrap; justify-content: center;
      gap: 8px; margin-bottom: 16px;
    }
    .modal-avatar-opt {
      font-size: 1.6rem; background: #f5f5f5; border: 2px solid transparent;
      border-radius: 10px; padding: 6px 8px; cursor: pointer; transition: border .15s;
    }
    .modal-avatar-opt.selected { border-color: #667eea; background: #eef0ff; }
    .modal-pin-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 6px; }
    .modal-pin-box {
      width: 48px; height: 52px; text-align: center;
      font-size: 1.3rem; border: 2px solid #e0e0e0; border-radius: 10px;
      outline: none; transition: border .2s;
    }
    .modal-pin-box:focus { border-color: #667eea; }
    .modal-error { color: #e74c3c; font-size: .85rem; margin: 8px 0; min-height: 20px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .btn-modal-submit {
      flex: 1; padding: 12px; background: linear-gradient(135deg,#667eea,#764ba2);
      color: white; border: none; border-radius: 10px;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity .2s;
    }
    .btn-modal-submit:hover { opacity: .9; }
    .btn-modal-submit:disabled { opacity: .6; cursor: default; }
    .btn-modal-cancel {
      padding: 12px 18px; background: #f5f5f5; color: #555;
      border: none; border-radius: 10px; font-size: 1rem;
      font-weight: 600; cursor: pointer;
    }
    .btn-modal-cancel:hover { background: #e8e8e8; }

    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }
    .player-card {
      background: white; border-radius: 16px;
      padding: 24px; box-shadow: 0 8px 30px rgba(0,0,0,.15);
    }
    .player-card h2 {
      font-size: 1.3rem; margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .player-avatar { font-size: 1.6rem; }

    .section-title {
      font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: #888; margin: 14px 0 8px;
    }
    .stat-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #f0f0f0; font-size: .9rem;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: #555; }
    .stat-val { font-weight: 700; color: #333; }
    .badge-done {
      background: #26de81; color: white;
      font-size: .72rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; margin-left: 6px;
    }
    .badge-progress {
      background: #f9ca24; color: #333;
      font-size: .72rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px; margin-left: 6px;
    }

    .last-seen-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .78rem;
      color: #888;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 4px;
    }
    .ip-badge {
      font-family: monospace;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 6px;
      color: #555;
    }

    .grade-pill {
      background: #667eea;
      color: white;
      font-size: .78rem;
      padding: 2px 10px;
      border-radius: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .card-header h2 { margin-bottom: 0; }
    .btn-delete-player {
      background: none;
      border: 1.5px solid #e74c3c;
      color: #e74c3c;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, color .15s;
    }
    .btn-delete-player:hover { background: #e74c3c; color: white; }

    .points-summary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 16px;
      text-align: center;
      color: white;
    }
    .pts-total {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 6px;
    }
    .pts-breakdown {
      display: flex;
      justify-content: center;
      gap: 14px;
      font-size: .82rem;
      font-weight: 700;
      opacity: .9;
    }

    .no-players {
      text-align: center; color: rgba(255,255,255,.8);
      font-size: 1.1rem; margin-top: 60px;
    }
    .loading { color: rgba(255,255,255,.8); text-align: center; margin-top: 60px; font-size: 1.1rem; }
  </style>
</head>
<body>
  <div class="container" id="root"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/levels.js"></script>
  <script src="js/word-levels.js"></script>
  <script src="js/choices-levels.js"></script>
  <script src="js/firebase-config.js"></script>

  <script>
    const AVATARS = ['🦊','🐼','🦁','🐸','🦋','🦄','🐯','🐨','🦉','🐙'];
    const root = document.getElementById('root');

    // ── Auth state ─────────────────────────────────────────────
    auth.onAuthStateChanged(user => {
      if (user) renderDashboard(user);
      else renderLogin();
    });

    // ── Login screen ───────────────────────────────────────────
    function renderLogin() {
      root.innerHTML = `
        <div class="login-card">
          <div style="font-size:2.5rem;margin-bottom:12px">🔐</div>
          <h1>Parent Dashboard</h1>
          <p>LearnSpark — sign in to view your kids' progress</p>
          <div class="input-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="your@email.com" />
          </div>
          <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" />
          </div>
          <button class="btn-login" id="btn-login">Sign In</button>
          <div class="error-msg" id="err"></div>
        </div>`;

      document.getElementById('btn-login').onclick = () => {
        const email = document.getElementById('email').value.trim();
        const pass  = document.getElementById('password').value;
        auth.signInWithEmailAndPassword(email, pass)
          .catch(e => { document.getElementById('err').textContent = 'Wrong email or password.'; });
      };
      document.getElementById('password').addEventListener('keydown', e => {
        if (e.key === 'Enter') document.getElementById('btn-login').click();
      });
    }

    // ── Dashboard ──────────────────────────────────────────────
    function renderDashboard(user) {
      root.innerHTML = `
        <div class="dashboard-header">
          <h1>📊 Progress Dashboard</h1>
          <div style="display:flex;gap:10px">
            <button class="btn-add-player" id="btn-add-player">+ Add Player</button>
            <button class="btn-signout" id="btn-signout">Sign out</button>
          </div>
        </div>
        <div class="loading" id="loading">Loading players…</div>
        <div class="players-grid" id="grid" style="display:none"></div>`;

      document.getElementById('btn-signout').onclick   = () => auth.signOut();
      document.getElementById('btn-add-player').onclick = () => showAddPlayerModal();

      db.collection('progress').get().then(snapshot => {
        document.getElementById('loading').style.display = 'none';
        const grid = document.getElementById('grid');
        grid.style.display = 'grid';

        if (snapshot.empty) {
          grid.innerHTML = '<p class="no-players">No players yet — kids need to play first!</p>';
          return;
        }

        let idx = 0;
        snapshot.forEach(doc => {
          const name = doc.id;
          const p = doc.data();
          grid.innerHTML += buildPlayerCard(name, p, idx++);
        });

        grid.querySelectorAll('.btn-delete-player').forEach(btn => {
          btn.onclick = () => {
            const name = btn.dataset.name;
            if (!confirm(`Delete ${name}'s profile and all progress? This cannot be undone.`)) return;
            db.collection('progress').doc(name).delete().then(() => {
              btn.closest('.player-card').remove();
              if (!grid.querySelector('.player-card')) {
                grid.innerHTML = '<p class="no-players">No players yet — kids need to play first!</p>';
              }
            }).catch(e => alert('Delete failed: ' + e.message));
          };
        });
      });
    }

    function getMathPoints(p)   { return Object.values(p.levels      || {}).reduce((s,v) => s + v.sheetsCompleted * 10, 0); }
    function getWordPoints(p)   { return Object.values(p.wordLevels  || {}).reduce((s,v) => s + v.sheetsCompleted * 10, 0); }
    function getChoicePoints(p) { return Object.values(p.choiceLevels|| {}).reduce((s,v) => s + v.sheetsCompleted *  5, 0); }

    function gradeOfLevel(id) {
      const grades = Object.keys(GRADE_STARTS).map(Number).sort((a,b) => b - a);
      for (const g of grades) { if (id >= GRADE_STARTS[g]) return g; }
      return 1;
    }

    function buildPlayerCard(name, p, idx) {
      const avatar = p.avatar || AVATARS[idx % AVATARS.length];
      const mathPts   = getMathPoints(p);
      const wordPts   = getWordPoints(p);
      const choicePts = getChoicePoints(p);
      const totalPts  = mathPts + wordPts + choicePts;

      // ── Math progress ──
      let mathHTML = '';
      if (p.placementDone) {
        const curLevel = LEVELS[p.currentLevelId];
        const grade = gradeOfLevel(p.currentLevelId || 0);
        mathHTML += `<div class="stat-row"><span class="stat-label">Grade</span><span class="stat-val grade-pill">Grade ${grade}</span></div>`;
        mathHTML += `<div class="stat-row"><span class="stat-label">Current level</span><span class="stat-val">${curLevel ? curLevel.name : 'Completed!'}</span></div>`;
        const completedLevels = Object.entries(p.levels || {}).filter(([,v]) => v.completed);
        mathHTML += `<div class="stat-row"><span class="stat-label">Levels completed</span><span class="stat-val">${completedLevels.length} / ${LEVELS.length}</span></div>`;
        Object.entries(p.levels || {}).forEach(([id, v]) => {
          if (v.sheetsCompleted > 0) {
            const lvl = LEVELS[parseInt(id)];
            const label = lvl ? lvl.name : `Level ${id}`;
            mathHTML += `<div class="stat-row">
              <span class="stat-label">${label}</span>
              <span class="stat-val">${v.sheetsCompleted} sheets${v.completed ? '<span class="badge-done">Done</span>' : ''}</span>
            </div>`;
          }
        });
      } else {
        mathHTML = '<div class="stat-row"><span class="stat-label">Status</span><span class="stat-val">Not started</span></div>';
      }

      // ── Words progress ──
      let wordsHTML = '';
      if (p.wordPlacementDone) {
        const curWL = WORD_LEVELS[p.wordCurrentLevelId];
        wordsHTML += `<div class="stat-row"><span class="stat-label">Current level</span><span class="stat-val">${curWL ? curWL.name : 'Completed!'}</span></div>`;
        Object.entries(p.wordLevels || {}).forEach(([id, v]) => {
          if (v.sheetsCompleted > 0) {
            const lvl = WORD_LEVELS[parseInt(id)];
            const label = lvl ? lvl.name : `Level ${id}`;
            wordsHTML += `<div class="stat-row">
              <span class="stat-label">${label}</span>
              <span class="stat-val">${v.sheetsCompleted} sheets${v.completed ? '<span class="badge-done">Done</span>' : ''}</span>
            </div>`;
          }
        });
      } else {
        wordsHTML = '<div class="stat-row"><span class="stat-label">Status</span><span class="stat-val">Not started</span></div>';
      }

      // ── Choices progress ──
      let choicesHTML = '';
      const choiceLevels = p.choiceLevels || {};
      const hasChoices = Object.values(choiceLevels).some(v => v.sheetsCompleted > 0);
      if (hasChoices) {
        CHOICE_TOPICS.forEach(topic => {
          topic.levels.forEach((lvl, li) => {
            const key = `${topic.id}_${li}`;
            const v = choiceLevels[key];
            if (v && v.sheetsCompleted > 0) {
              choicesHTML += `<div class="stat-row">
                <span class="stat-label">${topic.emoji} ${topic.name} — ${lvl.name}</span>
                <span class="stat-val">${v.sheetsCompleted} sheets${v.completed ? '<span class="badge-done">Done</span>' : ''}</span>
              </div>`;
            }
          });
        });
      } else {
        choicesHTML = '<div class="stat-row"><span class="stat-label">Status</span><span class="stat-val">Not started</span></div>';
      }

      const lastSeen = p.lastSeen
        ? new Date(p.lastSeen).toLocaleString()
        : 'Never';
      const lastIp = p.lastIp || '—';

      return `
        <div class="player-card" data-name="${name}">
          <div class="card-header">
            <h2><span class="player-avatar">${avatar}</span>${name}</h2>
            <button class="btn-delete-player" data-name="${name}" title="Delete player">🗑 Delete</button>
          </div>
          <div class="points-summary">
            <div class="pts-total">⭐ ${totalPts.toLocaleString()} total pts</div>
            <div class="pts-breakdown">
              <span>🔢 ${mathPts} math</span>
              <span>📝 ${wordPts} words</span>
              <span>💡 ${choicePts} choices</span>
            </div>
          </div>
          <div class="last-seen-row">
            <span>🕐 ${lastSeen}</span>
            <span class="ip-badge">🌐 ${lastIp}</span>
          </div>
          <div class="section-title">Math</div>
          ${mathHTML}
          <div class="section-title">Words</div>
          ${wordsHTML}
          <div class="section-title">Choices</div>
          ${choicesHTML}
        </div>`;
    }
    const AVATARS_LIST = ['🦊','🐼','🦁','🐸','🦋','🦄','🐯','🐨','🦉','🐙'];

    function showAddPlayerModal() {
      let selectedAvatar = AVATARS_LIST[0];

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.innerHTML = `
        <div class="modal-card">
          <h2>Add Player</h2>
          <p>Set up a new kid's account</p>
          <div class="modal-avatar-grid" id="modal-avatar-grid">
            ${AVATARS_LIST.map(a => `<button class="modal-avatar-opt ${a === selectedAvatar ? 'selected' : ''}" data-avatar="${a}">${a}</button>`).join('')}
          </div>
          <input class="modal-input" type="text" id="modal-name" placeholder="Kid's name" maxlength="20" autocomplete="off" />
          <div style="font-size:.85rem;font-weight:600;color:#555;text-align:left;margin-bottom:8px">4-digit PIN</div>
          <div class="modal-pin-row" id="modal-pin-boxes">
            <input class="modal-pin-box" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
            <input class="modal-pin-box" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
            <input class="modal-pin-box" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
            <input class="modal-pin-box" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
          </div>
          <div style="font-size:.85rem;font-weight:600;color:#555;text-align:left;margin-bottom:8px">Confirm PIN</div>
          <div class="modal-pin-row" id="modal-pin-confirm-boxes">
            <input class="modal-pin-box" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
            <input class="modal-pin-box" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
            <input class="modal-pin-box" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
            <input class="modal-pin-box" type="password" inputmode="numeric" maxlength="1" autocomplete="off">
          </div>
          <div class="modal-error" id="modal-error"></div>
          <div class="modal-actions">
            <button class="btn-modal-cancel" id="modal-cancel">Cancel</button>
            <button class="btn-modal-submit" id="modal-submit">Create Player</button>
          </div>
        </div>`;
      document.body.appendChild(overlay);

      // Avatar selection
      overlay.querySelector('#modal-avatar-grid').addEventListener('click', e => {
        const btn = e.target.closest('.modal-avatar-opt');
        if (!btn) return;
        selectedAvatar = btn.dataset.avatar;
        overlay.querySelectorAll('.modal-avatar-opt').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
      });

      // PIN box auto-advance
      function wirePins(containerId) {
        const boxes = [...overlay.querySelectorAll(`#${containerId} .modal-pin-box`)];
        boxes.forEach((box, i) => {
          box.addEventListener('input', () => {
            box.value = box.value.replace(/\D/g,'').slice(0,1);
            if (box.value && i < 3) boxes[i+1].focus();
          });
          box.addEventListener('keydown', e => {
            if (e.key === 'Backspace' && !box.value && i > 0) boxes[i-1].focus();
          });
        });
        return () => boxes.map(b => b.value).join('');
      }
      const getPin     = wirePins('modal-pin-boxes');
      const getConfirm = wirePins('modal-pin-confirm-boxes');

      overlay.querySelector('#modal-name').focus();
      overlay.querySelector('#modal-cancel').onclick = () => overlay.remove();

      overlay.querySelector('#modal-submit').onclick = () => {
        const name    = overlay.querySelector('#modal-name').value.trim();
        const pin     = getPin();
        const confirm = getConfirm();
        const errEl   = overlay.querySelector('#modal-error');
        const submitBtn = overlay.querySelector('#modal-submit');
        errEl.textContent = '';

        if (!name)          { errEl.textContent = 'Enter a name.'; return; }
        if (pin.length < 4) { errEl.textContent = 'Enter all 4 PIN digits.'; return; }
        if (pin !== confirm) { errEl.textContent = 'PINs don\'t match.'; return; }

        submitBtn.disabled    = true;
        submitBtn.textContent = 'Creating…';

        db.collection('progress').doc(name).get().then(doc => {
          if (doc.exists) {
            errEl.textContent    = 'That name is already taken.';
            submitBtn.disabled    = false;
            submitBtn.textContent = 'Create Player';
            return;
          }
          return db.collection('progress').doc(name).set({
            playerName:    name,
            pin:           pin,
            avatar:        selectedAvatar,
            placementDone: false,
            currentLevelId: 0,
            levels:        {}
          });
        }).then(result => {
          if (result === undefined) return; // name taken, already handled
          overlay.remove();
          location.reload(); // refresh dashboard to show new player
        }).catch(e => {
          errEl.textContent    = 'Error: ' + e.message;
          submitBtn.disabled    = false;
          submitBtn.textContent = 'Create Player';
        });
      };
    }
  </script>
</body>
</html>
